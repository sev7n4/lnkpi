# 生产 compose — 独立网络，与 pintuotuo / aimarket 栈隔离
# 本地调试:
#   cp deploy/.env.production.example .env
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
# 服务器（CVM 本地 build，推荐）:
#   export IMAGE_TAG=<git-sha> LNKPI_API_IMAGE=lnkpi-api:<git-sha>
#   docker compose -f deploy/docker-compose.prod.yml build api
#   docker compose -f deploy/docker-compose.prod.yml up -d --no-build api
#   # agent-runtime 勿随 api 自动 up；见 AGENT_RUNTIME_PRODUCTION.md
# 服务器（TCR 镜像，备选）:
#   export IMAGE_TAG=<git-sha> TCR_REGISTRY=ccr.ccs.tencentyun.com TCR_NAMESPACE=lnkpi
#   docker compose -f deploy/docker-compose.prod.yml -f deploy/docker-compose.prod.images.yml pull
#   docker compose -f deploy/docker-compose.prod.yml -f deploy/docker-compose.prod.images.yml up -d --no-build

name: lnkpi

services:
  api:
    image: ${LNKPI_API_IMAGE:-lnkpi-api:local}
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.api
    container_name: lnkpi-api
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    environment:
      PORT: "3001"
      DATABASE_URL: file:/app/apps/server/data/lnkpi.db
    ports:
      - "0.0.0.0:5100:3001"
    volumes:
      - lnkpi-data:/app/apps/server/data
      - lnkpi-uploads:/app/apps/server/uploads
    networks:
      - lnkpi
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    # 启用 LangGraph Runtime 时，在 /opt/lnkpi/.env 设置：
    #   AGENT_RUNTIME_URL=http://lnkpi-agent-runtime:8000
    #   AGENT_RUNTIME_SERVICE_TOKEN=<与 Runtime 相同>
    # 详见 deploy/AGENT_RUNTIME_PRODUCTION.md

  # 仅内网；勿映射 8000 到公网。部署步骤见 deploy/AGENT_RUNTIME_PRODUCTION.md
  agent-runtime:
    image: ${LNKPI_AGENT_RUNTIME_IMAGE:-lnkpi-agent-runtime:local}
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.agent-runtime
    container_name: lnkpi-agent-runtime
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    environment:
      # Token / OpenAI keys come from env_file ../.env (LNKPI_* + AGENT_RUNTIME_*)
      LNKPI_NEST_BASE_URL: ${LNKPI_NEST_BASE_URL:-http://lnkpi-api:3001/api}
      LNKPI_SKILLS_DIR: /app/skills
    # 无 ports：只通过 lnkpi-net 被 api 访问
    networks:
      - lnkpi
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

networks:
  lnkpi:
    name: lnkpi-net

volumes:
  lnkpi-data:
  lnkpi-uploads:
