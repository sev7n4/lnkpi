name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build monorepo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @lnkpi/server exec prisma generate

      - name: Build packages
        run: pnpm build

      - name: Agent tests
        run: pnpm --filter @lnkpi/agent test

      - name: Build summary
        if: always()
        run: |
          echo "## CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Node: 22" >> "$GITHUB_STEP_SUMMARY"
          echo "- pnpm build: completed" >> "$GITHUB_STEP_SUMMARY"

  docker-build:
    name: Build API Docker image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: false
          tags: lnkpi-api:ci
          cache-from: type=gha,scope=lnkpi-api
          cache-to: type=gha,scope=lnkpi-api,mode=max,ignore-error=true
