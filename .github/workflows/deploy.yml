name: Deploy API to Tencent Cloud

on:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - "packages/**"
      - "deploy/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".dockerignore"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main

permissions:
  contents: read

concurrency:
  group: lnkpi-deploy-production
  cancel-in-progress: true

env:
  IMAGE_TAG: ${{ github.sha }}
  DEPLOY_DIR: /opt/lnkpi
  API_PORT: "5100"

jobs:
  deploy:
    name: Build on CVM and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: production
    env:
      SSH_HOST: ${{ secrets.TENCENT_CLOUD_IP || secrets.DEPLOY_HOST }}
      SSH_USER: ${{ secrets.TENCENT_CLOUD_USER || secrets.DEPLOY_USER }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Prepare SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.TENCENT_CLOUD_SSH_KEY || secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host deploy-cvm
            HostName ${{ env.SSH_HOST }}
            User ${{ env.SSH_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ServerAliveInterval 30
            ServerAliveCountMax 120
            TCPKeepAlive yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Sync source to CVM
        run: |
          set -euo pipefail
          DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
          IMAGE_TAG="${{ env.IMAGE_TAG }}"

          tar --exclude='.git' \
              --exclude='node_modules' \
              --exclude='apps/web' \
              --exclude='**/dist' \
              --exclude='.cursor' \
              --exclude='docs' \
              -czf /tmp/lnkpi-src.tgz .

          scp /tmp/lnkpi-src.tgz deploy-cvm:/tmp/lnkpi-src.tgz

          ssh deploy-cvm <<EOF
          set -euo pipefail
          sudo mkdir -p ${DEPLOY_DIR}
          if [[ -f ${DEPLOY_DIR}/.env ]]; then
            sudo cp ${DEPLOY_DIR}/.env /tmp/lnkpi.env.bak
          fi
          sudo tar -xzf /tmp/lnkpi-src.tgz -C ${DEPLOY_DIR}
          if [[ -f /tmp/lnkpi.env.bak ]]; then
            sudo mv /tmp/lnkpi.env.bak ${DEPLOY_DIR}/.env
          elif [[ ! -f ${DEPLOY_DIR}/.env ]]; then
            sudo cp ${DEPLOY_DIR}/deploy/.env.production.example ${DEPLOY_DIR}/.env
            if command -v openssl >/dev/null 2>&1; then
              SECRET=\$(openssl rand -hex 24)
              sudo sed -i "s/请替换为随机长字符串/\${SECRET}/" ${DEPLOY_DIR}/.env
            fi
          fi
          sudo chmod +x ${DEPLOY_DIR}/deploy/deploy-remote-build.sh
          sudo chmod +x ${DEPLOY_DIR}/deploy/deploy-remote.sh
          sudo rm -f /tmp/lnkpi-deploy-${IMAGE_TAG}.status /tmp/lnkpi-deploy-${IMAGE_TAG}.log
          rm -f /tmp/lnkpi-src.tgz
          EOF

          rm -f /tmp/lnkpi-src.tgz

      - name: Launch background build on CVM
        run: |
          set -euo pipefail
          DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
          IMAGE_TAG="${{ env.IMAGE_TAG }}"
          STATUS_FILE="/tmp/lnkpi-deploy-${IMAGE_TAG}.status"
          LOG_FILE="/tmp/lnkpi-deploy-${IMAGE_TAG}.log"
          PID_FILE="/tmp/lnkpi-deploy-${IMAGE_TAG}.pid"

          # setsid + 全量重定向，避免 docker build 日志经 SSH 回传阻塞 GHA（此前导致 90min 超时）
          ssh -n deploy-cvm "sudo bash -c 'cd ${DEPLOY_DIR} && rm -f ${STATUS_FILE} ${LOG_FILE} ${PID_FILE} && setsid env IMAGE_TAG=${IMAGE_TAG} STATUS_FILE=${STATUS_FILE} LOG_FILE=${LOG_FILE} bash deploy/deploy-remote-build.sh </dev/null >>${LOG_FILE} 2>&1 & echo \$! > ${PID_FILE}'"

          sleep 2
          PID=$(ssh deploy-cvm "sudo cat ${PID_FILE} 2>/dev/null || true")
          if [[ -z "${PID}" ]]; then
            echo "ERROR: CVM build pid file missing"
            ssh deploy-cvm "sudo tail -40 ${LOG_FILE} 2>/dev/null || true"
            exit 1
          fi
          echo "Build started on CVM (pid=${PID}, log=${LOG_FILE})"

      - name: Wait for CVM build
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ env.IMAGE_TAG }}"
          STATUS_FILE="/tmp/lnkpi-deploy-${IMAGE_TAG}.status"
          LOG_FILE="/tmp/lnkpi-deploy-${IMAGE_TAG}.log"
          OK=0

          for i in $(seq 1 180); do
            STATUS=$(ssh deploy-cvm "sudo cat ${STATUS_FILE} 2>/dev/null || echo pending")
            echo "Attempt $i: status=${STATUS}"
            case "$STATUS" in
              success)
                OK=1
                break
                ;;
              failed)
                echo "=== CVM build log (tail) ==="
                ssh deploy-cvm "sudo tail -80 ${LOG_FILE} 2>/dev/null || true"
                exit 1
                ;;
            esac
            sleep 30
          done

          if [[ "$OK" != "1" ]]; then
            echo "Build timed out after 90 minutes"
            ssh deploy-cvm "sudo tail -80 ${LOG_FILE} 2>/dev/null || true"
            exit 1
          fi

          echo "CVM build succeeded"

      - name: Verify deployment
        run: |
          set -euo pipefail
          API_PORT="${{ env.API_PORT }}"
          SSH_HOST="${{ env.SSH_HOST }}"
          OK=0
          for i in $(seq 1 10); do
            if ssh deploy-cvm "curl -fsS --connect-timeout 5 --max-time 10 http://127.0.0.1:${API_PORT}/api/health" >/tmp/lnkpi-health.json 2>/dev/null; then
              echo "Health OK (localhost): http://127.0.0.1:${API_PORT}/api/health"
              head -c 200 /tmp/lnkpi-health.json
              echo ""
              OK=1
              break
            fi
            echo "Attempt $i: localhost health check failed"
            sleep $((i <= 5 ? 5 : 10))
          done
          rm -f /tmp/lnkpi-health.json
          [ "$OK" = "1" ] || {
            echo "=== diagnostics ==="
            ssh deploy-cvm "docker ps -a --filter name=lnkpi-api; ss -tlnp | grep ':${API_PORT}' || true; docker logs lnkpi-api --tail 30 2>&1 || true"
            exit 1
          }

          echo "=== public IP from server ==="
          ssh deploy-cvm "ss -tlnp | grep ':${API_PORT}' || true; docker port lnkpi-api 2>/dev/null || true; (sudo ufw status 2>/dev/null || true); (sudo iptables -S INPUT 2>/dev/null | head -15 || true)"
          if ssh deploy-cvm "curl -fsS --connect-timeout 5 --max-time 10 http://${SSH_HOST}:${API_PORT}/api/health" 2>/dev/null | head -c 200; then
            echo ""
            echo "Public health OK (from server)"
          else
            echo "WARN: public IP unreachable from server (hairpin NAT may be blocked)"
          fi

          echo "=== public IP from GitHub Actions ==="
          if curl -fsS --connect-timeout 5 --max-time 10 "http://${SSH_HOST}:${API_PORT}/api/health" | head -c 200; then
            echo ""
            echo "Public health OK (external)"
          else
            echo "WARN: public IP unreachable from GitHub Actions — check security group / port conflict"
            exit 1
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## lnkpi API Deployment (CVM local build)"
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Status | ${{ job.status }} |"
            echo "| Image | \`lnkpi-api:${{ env.IMAGE_TAG }}\` (built on CVM) |"
            echo "| Server | \`${{ env.SSH_HOST }}:${{ env.API_PORT }}\` |"
            echo "| Health | \`http://${{ env.SSH_HOST }}:${{ env.API_PORT }}/api/health\` |"
            echo ""
            echo "Vercel 前端请设置 \`VITE_API_BASE_URL=http://${{ env.SSH_HOST }}:${{ env.API_PORT }}/api\`"
          } >> "$GITHUB_STEP_SUMMARY"
