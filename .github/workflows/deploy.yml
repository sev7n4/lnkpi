name: Deploy API to Tencent Cloud

on:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - "packages/**"
      - "deploy/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".dockerignore"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main
      recover_only:
        description: Only recover CVM (cleanup + restart existing API)
        required: false
        default: false
        type: boolean
      enable_agent_runtime:
        description: Sync + enable Agent Runtime on CVM (Compose; see deploy/AGENT_RUNTIME_PRODUCTION.md)
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: lnkpi-deploy-production
  cancel-in-progress: true

env:
  IMAGE_TAG: ${{ github.sha }}
  DEPLOY_DIR: /opt/lnkpi
  API_PORT: "5100"

jobs:
  deploy:
    name: Build on CVM and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: production
    env:
      SSH_HOST: ${{ secrets.TENCENT_CLOUD_IP || secrets.DEPLOY_HOST }}
      # 腾讯云 CVM 需使用 root + 密钥登录；非 root 用户会触发微信扫码且 sudo 易挂起
      SSH_USER: ${{ secrets.TENCENT_CLOUD_USER || secrets.DEPLOY_USER || 'root' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Prepare SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.TENCENT_CLOUD_SSH_KEY || secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host deploy-cvm
            HostName ${{ env.SSH_HOST }}
            User ${{ env.SSH_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            BatchMode yes
            LogLevel ERROR
            ServerAliveInterval 15
            ServerAliveCountMax 30
            TCPKeepAlive yes
            ConnectTimeout 30
          EOF
          chmod 600 ~/.ssh/config

          cat > /tmp/lnkpi-ssh-retry.sh <<'RETRY'
          #!/usr/bin/env bash
          set -euo pipefail
          label="$1"; shift
          for attempt in $(seq 1 8); do
            echo "${label} attempt ${attempt}/8"
            if "$@"; then
              exit 0
            fi
            sleep $((attempt * 10))
          done
          echo "ERROR: ${label} failed after retries"
          exit 1
          RETRY
          chmod +x /tmp/lnkpi-ssh-retry.sh

      - name: Recover CVM
        run: |
          set -euo pipefail
          DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
          API_PORT="${{ env.API_PORT }}"
          SSH_HOST="${{ env.SSH_HOST }}"
          RECOVER_OK=0
          # -T + bash -s 避免腾讯云登录 shell MOTD/二维码污染 SSH 输出
          if /tmp/lnkpi-ssh-retry.sh "recover-ssh" ssh -T deploy-cvm "bash -s" < deploy/cvm-recover.sh; then
            RECOVER_OK=1
          elif ssh -T deploy-cvm "bash -s" <<EOF
          set -euo pipefail
          pkill -f deploy-remote-build || true
          pkill -f launch-cvm-build || true
          docker ps --filter name=lnkpi-api || true
          EOF
          then
            RECOVER_OK=1
          fi
          if [[ "$RECOVER_OK" != "1" ]]; then
            echo "WARN: recover SSH failed after retries; checking external health..."
            if curl -fsS --connect-timeout 5 --max-time 10 "http://${SSH_HOST}:${API_PORT}/api/health" >/tmp/lnkpi-recover-health.json; then
              echo "External health OK — continuing deploy"
              head -c 200 /tmp/lnkpi-recover-health.json
              echo ""
            else
              echo "ERROR: recover failed and API unreachable"
              exit 1
            fi
          fi

      - name: Sync source to CVM
        if: ${{ github.event.inputs.recover_only != true }}
        run: |
          set -euo pipefail
          DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
          IMAGE_TAG="${{ env.IMAGE_TAG }}"

          tar --exclude='.git' \
              --exclude='node_modules' \
              --exclude='apps/web' \
              --exclude='**/dist' \
              --exclude='.cursor' \
              --exclude='docs' \
              -czf - . | /tmp/lnkpi-ssh-retry.sh "sync-tar" ssh deploy-cvm "bash -lc 'mkdir -p ${DEPLOY_DIR} && if [[ -f ${DEPLOY_DIR}/.env ]]; then cp ${DEPLOY_DIR}/.env /tmp/lnkpi.env.bak; fi && tar -xzf - -C ${DEPLOY_DIR} && if [[ -f /tmp/lnkpi.env.bak ]]; then mv /tmp/lnkpi.env.bak ${DEPLOY_DIR}/.env; elif [[ ! -f ${DEPLOY_DIR}/.env ]]; then cp ${DEPLOY_DIR}/deploy/.env.production.example ${DEPLOY_DIR}/.env; fi && chmod +x ${DEPLOY_DIR}/deploy/deploy-remote-build.sh ${DEPLOY_DIR}/deploy/deploy-remote.sh ${DEPLOY_DIR}/deploy/launch-cvm-build.sh ${DEPLOY_DIR}/deploy/cvm-recover.sh ${DEPLOY_DIR}/deploy/enable-agent-runtime.sh && rm -f /tmp/lnkpi-deploy-${IMAGE_TAG}.status /tmp/lnkpi-deploy-${IMAGE_TAG}.log'"

      - name: Enable Agent Runtime on CVM
        if: ${{ github.event.inputs.enable_agent_runtime == true }}
        run: |
          set -euo pipefail
          DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
          /tmp/lnkpi-ssh-retry.sh "enable-runtime-ssh" ssh -T deploy-cvm "bash -s" < deploy/enable-agent-runtime.sh
          echo "=== post-enable: Nest token gate (external) ==="
          MSG=$(curl -sS --connect-timeout 5 --max-time 10 -X POST \
            "http://${{ env.SSH_HOST }}:${{ env.API_PORT }}/api/agent/internal/get-canvas-summary" \
            -H 'Content-Type: application/json' -d '{"sessionId":"x"}' || true)
          echo "$MSG" | head -c 300
          echo ""
          if echo "$MSG" | grep -q 'not configured'; then
            echo "ERROR: AGENT_RUNTIME_SERVICE_TOKEN still not configured on Nest"
            exit 1
          fi
          ssh -T deploy-cvm "docker exec lnkpi-agent-runtime curl -fsS http://127.0.0.1:8000/health"

      - name: Launch background build on CVM
        if: ${{ github.event.inputs.recover_only != true && github.event.inputs.enable_agent_runtime != true }}
        run: |
          set -euo pipefail
          DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
          IMAGE_TAG="${{ env.IMAGE_TAG }}"
          STATUS_FILE="/tmp/lnkpi-deploy-${IMAGE_TAG}.status"
          LOG_FILE="/tmp/lnkpi-deploy-${IMAGE_TAG}.log"
          PID_FILE="/tmp/lnkpi-deploy-${IMAGE_TAG}.pid"

          # 使用独立 launcher 脚本立即返回，避免 sudo bash -c 'cmd &' 等待后台任务
          LAUNCH_OUT=$(/tmp/lnkpi-ssh-retry.sh "launch-ssh" ssh -n deploy-cvm "bash ${DEPLOY_DIR}/deploy/launch-cvm-build.sh ${IMAGE_TAG}")
          echo "${LAUNCH_OUT}"

          sleep 2
          PID=$(ssh deploy-cvm "cat ${PID_FILE} 2>/dev/null || true")
          if [[ -z "${PID}" ]]; then
            echo "ERROR: CVM build pid file missing"
            ssh deploy-cvm "tail -40 ${LOG_FILE} 2>/dev/null || true"
            exit 1
          fi
          echo "Build started on CVM (pid=${PID}, log=${LOG_FILE})"

      - name: Wait for CVM build
        if: ${{ github.event.inputs.recover_only != true && github.event.inputs.enable_agent_runtime != true }}
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ env.IMAGE_TAG }}"
          STATUS_FILE="/tmp/lnkpi-deploy-${IMAGE_TAG}.status"
          LOG_FILE="/tmp/lnkpi-deploy-${IMAGE_TAG}.log"
          OK=0

          for i in $(seq 1 180); do
            RAW=$(ssh -T deploy-cvm "cat ${STATUS_FILE} 2>/dev/null || echo pending" 2>/dev/null || echo pending)
            STATUS=$(printf '%s' "$RAW" | tr -d '\r' | grep -Eo 'success|failed|running|pending' | tail -1 || echo pending)
            echo "Attempt $i: status=${STATUS}"
            case "$STATUS" in
              success)
                OK=1
                break
                ;;
              failed)
                echo "=== CVM build log (tail) ==="
                ssh deploy-cvm "tail -80 ${LOG_FILE} 2>/dev/null || true"
                exit 1
                ;;
            esac
            sleep 30
          done

          if [[ "$OK" != "1" ]]; then
            echo "Build timed out after 90 minutes"
            ssh deploy-cvm "tail -80 ${LOG_FILE} 2>/dev/null || true"
            exit 1
          fi

          echo "CVM build succeeded"

      - name: Verify deployment
        run: |
          set -euo pipefail
          API_PORT="${{ env.API_PORT }}"
          SSH_HOST="${{ env.SSH_HOST }}"
          OK=0
          for i in $(seq 1 10); do
            if ssh deploy-cvm "curl -fsS --connect-timeout 5 --max-time 10 http://127.0.0.1:${API_PORT}/api/health" >/tmp/lnkpi-health.json 2>/dev/null; then
              echo "Health OK (localhost): http://127.0.0.1:${API_PORT}/api/health"
              head -c 200 /tmp/lnkpi-health.json
              echo ""
              OK=1
              break
            fi
            echo "Attempt $i: localhost health check failed"
            sleep $((i <= 5 ? 5 : 10))
          done
          rm -f /tmp/lnkpi-health.json
          [ "$OK" = "1" ] || {
            echo "=== diagnostics ==="
            ssh deploy-cvm "docker ps -a --filter name=lnkpi-api; ss -tlnp | grep ':${API_PORT}' || true; docker logs lnkpi-api --tail 30 2>&1 || true"
            exit 1
          }

          echo "=== public IP from server ==="
          ssh deploy-cvm "ss -tlnp | grep ':${API_PORT}' || true; docker port lnkpi-api 2>/dev/null || true; (sudo ufw status 2>/dev/null || true); (sudo iptables -S INPUT 2>/dev/null | head -15 || true)"
          if ssh deploy-cvm "curl -fsS --connect-timeout 5 --max-time 10 http://${SSH_HOST}:${API_PORT}/api/health" 2>/dev/null | head -c 200; then
            echo ""
            echo "Public health OK (from server)"
          else
            echo "WARN: public IP unreachable from server (hairpin NAT may be blocked)"
          fi

          echo "=== public IP from GitHub Actions ==="
          if curl -fsS --connect-timeout 5 --max-time 10 "http://${SSH_HOST}:${API_PORT}/api/health" | head -c 200; then
            echo ""
            echo "Public health OK (external)"
          else
            echo "WARN: public IP unreachable from GitHub Actions — check security group / port conflict"
            exit 1
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## lnkpi API Deployment (CVM local build)"
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Status | ${{ job.status }} |"
            echo "| Image | \`lnkpi-api:${{ env.IMAGE_TAG }}\` (built on CVM) |"
            echo "| Server | \`${{ env.SSH_HOST }}:${{ env.API_PORT }}\` |"
            echo "| Health | \`http://${{ env.SSH_HOST }}:${{ env.API_PORT }}/api/health\` |"
            echo ""
            echo "Vercel 前端请设置 \`VITE_API_BASE_URL=http://${{ env.SSH_HOST }}:${{ env.API_PORT }}/api\`"
          } >> "$GITHUB_STEP_SUMMARY"
